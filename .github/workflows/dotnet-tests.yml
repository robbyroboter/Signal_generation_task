name: .NET CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Signal_gen_task/Signal_gen_task.sln

      - name: Build
        run: dotnet build Signal_gen_task/Signal_gen_task.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Signal_gen_task/Signal_gen_task.sln --configuration Release --no-build